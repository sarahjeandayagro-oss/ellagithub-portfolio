<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ella B. Lerasan | Portfolio</title>
    <style>
        :root {
            --bg-main: #DC9B9B; /* Main beautiful rose pink background */
            --bg-banner: #F6F4E8; /* Soft cream for top nav split */
            --border-color: #C0E1D2; /* Soft sage green highlight tint */
            --text-dark: #24292f;
            --text-muted: #57606a;
            --accent-green: #2e614a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: #ffffff;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* Top Elegant Navigation Bar from image context layout */
        .navbar {
            background-color: var(--bg-banner);
            padding: 20px 0;
            border-bottom: 1px solid var(--border-color);
            text-align: center;
        }

        .navbar a {
            color: var(--text-dark);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin: 0 15px;
            transition: color 0.2s;
        }

        .navbar a:hover, .navbar a.active {
            color: var(--bg-main);
            border-bottom: 2px solid var(--bg-main);
            padding-bottom: 4px;
        }

        /* Big Section Header Typography */
        .section-title {
            font-family: "Georgia", serif;
            font-style: italic;
            font-size: 4.5rem;
            font-weight: 400;
            text-align: center;
            margin: 50px 0 40px 0;
            color: #ffffff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.05);
        }

        /* Main Projects Row Container matching image_6979a7.jpg */
        .projects-showcase-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 30px;
        }

        /* 📱 Mobile Phone Mockup Frame Design */
        .phone-mockup {
            width: 240px;
            height: 480px;
            background: #1e1e1e;
            border: 12px solid #2d2d2d;
            border-radius: 36px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            position: relative;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        /* 📄 Curved Booklet Card Design (Middle Item) */
        .booklet-card {
            width: 320px;
            height: 380px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid var(--border-color);
            cursor: pointer;
        }

        .phone-mockup:hover, .booklet-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.4);
        }

        /* Image Display Fits Inside Frames Perfectly */
        .display-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Interactive Hover Overlay to show project view cues */
        .preview-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(220, 155, 155, 0.85); /* Smooth tint color overlay matching scheme */
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .phone-mockup:hover .preview-overlay {
            opacity: 1;
        }

        .preview-text {
            color: #ffffff;
            font-weight: 600;
            font-size: 1.1rem;
            border: 2px solid #ffffff;
            padding: 8px 18px;
            border-radius: 20px;
            background: rgba(0,0,0,0.1);
        }

        /* Center Pill Navigation Trigger Button at bottom */
        .action-btn-container {
            text-align: center;
            margin: 60px 0;
        }

        .see-more-btn {
            background-color: #ffffff;
            color: var(--bg-main);
            border: none;
            padding: 14px 36px;
            font-size: 0.95rem;
            font-weight: 700;
            border-radius: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .see-more-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.85rem;
            opacity: 0.8;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<!-- Navigation Bar Concept matching image_6979a7.jpg -->
<nav class="navbar">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Certificate</a>
    <a href="#" class="active">Projects</a>
    <a href="#">Contact</a>
</nav>

<!-- Immersive Title Header Context -->
<h1 class="section-title">Projects</h1>

<!-- Creative Showcase Display Grid Blocks (No more text resumes!) -->
<main class="projects-showcase-container">

    <!-- Project 1: Phone Mockup Frame (Jobify Interface Display) -->
    <div class="phone-mockup">
        <img src="6b51537a-0c61-4f35-ae49-4c752ad4aaee.jpg" class="display-img" alt="Jobify Mobile System Feature">
        <div class="preview-overlay">
            <span class="preview-text">View Project</span>
        </div>
    </div>

    <!-- Project 2: Booklet Presenter Frame (Middle Showcase Card) -->
    <div class="booklet-card">
        <img src="ebb74b49-1aef-47e1-b464-8a9f2563cd02.jpg" class="display-img" alt="Proveya Document Overview Layout">
    </div>

    <!-- Project 3: Phone Mockup Frame (DMW XI Project Interface Display) -->
    <div class="phone-mockup">
        <img src="2fadfe57-cdeb-4693-b0a0-e91cd2c2745f.jpg" class="display-img" alt="DMW XI System Interface Display">
        <div class="preview-overlay">
            <span class="preview-text">View Preview</span>
        </div>
    </div>

</main>

<!-- Bottom See More Action Pill Button Trigger -->
<div class="action-btn-container">
    <a href="https://github.com/sarahjeandayagro-oss/ellagithub-portfolio" target="_blank" class="see-more-btn">
        See More &rarr;
    </a>
</div>

<footer>
    <p>&copy; 2026 Ella B. Lerasan | Powered by GitHub Pages</p>
</footer>

</body>
</html>
